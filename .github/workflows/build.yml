name: Build CFST Manager

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run core tests
        run: swift run CFSTCoreTestRunner

      - name: Build app executable
        run: swift build --product CFSTManager

  package:
    name: Package Apple Silicon app
    needs: test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache CloudflareSpeedTest release
        uses: actions/cache@v5
        with:
          path: .cache/cfst
          key: cfst-v2.3.5-darwin-arm64

      - name: Package app
        run: CFST_MANAGER_FORCE_DOWNLOAD=1 CFST_DOWNLOAD_DIR="$PWD/.cache/cfst" Scripts/package_app.sh

      - name: Zip app
        run: ditto -c -k --keepParent "dist/CFST Manager.app" "dist/CFST-Manager-macOS-arm64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: CFST-Manager-macOS-arm64
          path: dist/CFST-Manager-macOS-arm64.zip
          retention-days: 7

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request'
    needs: test
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache CloudflareSpeedTest release
        uses: actions/cache@v5
        with:
          path: .cache/cfst
          key: cfst-v2.3.5-darwin-arm64

      - name: Package app
        run: CFST_MANAGER_FORCE_DOWNLOAD=1 CFST_DOWNLOAD_DIR="$PWD/.cache/cfst" Scripts/package_app.sh

      - name: Zip app
        run: ditto -c -k --keepParent "dist/CFST Manager.app" "dist/CFST-Manager-macOS-arm64.zip"

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes_file="$(mktemp)"
          printf 'CFST Manager Apple Silicon build.\n' > "$notes_file"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "CFST Manager $GITHUB_REF_NAME" \
              --notes-file "$notes_file"
            gh release upload "$GITHUB_REF_NAME" "dist/CFST-Manager-macOS-arm64.zip" --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "dist/CFST-Manager-macOS-arm64.zip" \
              --title "CFST Manager $GITHUB_REF_NAME" \
              --notes-file "$notes_file"
          fi
